name: tajweed

description: "A new Flutter project."

publish_to: "none"

version: 1.0.2+3

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.1
  shared_preferences: ^2.5.3
  package_info_plus: ^8.1.0
  url_launcher: ^6.3.1
  flutter_svg: ^2.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.6
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/branding/tajweed_logo.svg
    - assets/branding/vearth_logo.svg

flutter_native_splash:
  color: "#F5F7FA"
  color_dark: "#F5F7FA"
  image: assets/branding/tajweed_logo_splash.png
  image_dark: assets/branding/tajweed_logo_splash.png
  android: true
  ios: true
  web: false
  android_12:
    color: "#F5F7FA"
    color_dark: "#F5F7FA"
    image: assets/branding/tajweed_logo_android12.png
    icon_background_color: "#F5F7FA"
    icon_background_color_dark: "#F5F7FA"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/branding/tajweed_logo.png"
  adaptive_icon_background: "#EFF6F8"
  adaptive_icon_foreground: "assets/branding/tajweed_logo.png"
  remove_alpha_ios: true
  min_sdk_android: 21
